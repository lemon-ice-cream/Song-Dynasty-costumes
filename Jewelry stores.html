<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宋韵服饰</title>
    <style>
        html,body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 100%;
            position: relative;
            margin: 0 auto;
            text-align: center;
            height: 100vh;
            overflow: hidden;
        }
        
        .bg {
            display: flex;
            position: relative;
            justify-content: center;
            align-items: center;
            width: fit-content;
            height: 100%;
            overflow: hidden;
        }
        
        .bgimg {
            max-width: 100%;
            max-height: 100%;
            height: 100vh;
		}

        .back{
            position: absolute;
            width: 15%;
            left:0;
            top:3%;
        }

        .title{
            position: absolute;
            width:100%;
            z-index: 5;
            top:30%;
            animation: slideInOut 5s forwards;
        }

        @keyframes slideInOut {
            0% {
                transform: translateX(-100%);
            }
            50% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(100%);
            }
        }
        
        .person{
            position: absolute;
            height: 90%;
            top:8%;
            left:6%;
        }

        #head{
            position: absolute;
            height: 100%;
            z-index: 4;
        }

        #shoulder{
            position: absolute;
            height: 100%;
            left:-1%;
            z-index: 2;
        }

        #hand{
            position: absolute;
            height: 100%;
            z-index: 2;
        }

        #fazan{
            position: absolute;
            height: 100%;
            z-index:4;
            visibility: hidden;
        }

        #guanshi{
            position: absolute;
            height: 100%;
            z-index:4;
            visibility: hidden;
        }

        #upper{
            position: absolute;
            height: 100%;
            z-index: 3;
        }

        #moxiong{
            position: absolute;
            height: 100%;
            top:1.5%;
            z-index: 2;
        }

        #lower{
            position: absolute;
            height: 100%;
            z-index: 1;
            top:-1%;
        }

        #ershi{
            position: absolute;
            height: 100%;
            z-index:4;
            visibility: hidden;
        }

        #pibo{
            position:relative;
            height: 100%;
            left: -21.5%;
            z-index:4;
            visibility: hidden;
        }
        
        .window1{
            position: absolute;
            width: 100%;
            bottom: 0;
            z-index: 4;
        }

        .window2{
            display: flex;
            position: absolute;
            justify-content: space-between;
            flex-direction: row;
            width: 50%;
            bottom: 27%;
            z-index: 4;
        }

        .button{
            width: 30%;
            margin: 5px;
            cursor: pointer;
        }

        .window3{
            display: flex;
            position: absolute;
            flex-direction: row;
            flex-wrap: nowrap;
            bottom: 0.5%;
            left:3%;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            z-index: 4;
        }
        
        .window3::-webkit-scrollbar{
            display: none;
        }

        .Frame{
            display: flex;
            position: absolute;
            flex-direction: row;
            flex-wrap: nowrap;
            bottom: 0.5%;
            left:3%;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            z-index: 4;
        }

        .Frame::-webkit-scrollbar{
            display: none;
        }

        .basemap{
            width: 28%;
            margin: 0px 10px;
            cursor: pointer;
        }

        #frame0{
            bottom: 5%;
        }

        .guanshi{
            width: 25%;
            margin: 0px 16px;
            cursor: pointer;
        }

        #frame1{
            bottom: 7%;
            visibility: hidden;
        }

        .fazan{
            width: 26%;
            margin: 0px 14px;
            cursor: pointer;
        }

        #frame2{
            bottom: 7%;
            visibility: hidden;
        }

        .ershi{
            width: 26%;
            margin: 0px 15px;
            cursor: pointer;
        }
    
        .introduce{
            position: absolute;
            height: 38%;
            top:12%;
            right:12%;
        }

        .buy{
            position: absolute;
            width: 17%;
            right:23%;
            top:52%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bg">
            <img class="bgimg" src="./material/Jewelry stores/背景 首饰店.jpg">
            <img class="title" src="./material/Jewelry stores/首饰店 标题.png">
            <img class="back" onclick="back()" src="./material/素材 返回键.png">

            <div class="person">
                <img id="head" src="./material/初始 发型.png">
                <img id="shoulder" src="./material/肩部.png">
                <img id="hand" src="./material/素材 手部.png">
                <img id="fazan" src="./material/cloakroom/Jewelry/Fazan/fazan0.png">
                <img id="guanshi" src="./material/cloakroom/Guanshi/guanshi0.png">
                <img id="upper" src="./material/素衣.png">
                <img id="moxiong" src="./material/背心.png">
                <img id="lower" src="./material/素裙（阴影）.png">
                <img id="ershi" src="./material/cloakroom/Jewelry/Ershi/ershi0.png">
                <img id="pibo" src="./material/cloakroom/Pibo/pibo0.png">
            </div>

            <img class="window1" src="./material/店铺素材2.png">
            <div class="window2">
                <img class="button" id="Guanshi" onclick="toggle(this)" src="./material/Jewelry stores/素材 按键便冠.png">
                <img class="button" id="Fazan" onclick="toggle(this)" src="./material/Jewelry stores/素材 按键发簪.png">
                <img class="button" id="Ershi" onclick="toggle(this)" src="./material/Jewelry stores/素材 按键耳饰.png">
            </div>

            <div class="window3" id="frame">
                <img class="basemap" src="./material/底图.png">
                <img class="basemap" src="./material/底图.png">
                <img class="basemap" src="./material/底图.png">
                <img class="basemap" src="./material/底图.png">
            </div>

            <div class="Frame" id="frame0">
                <img class="guanshi" onclick="guanshi(this)" src="./material/cloakroom/Guanshi/过桥髻.png">
                <img class="guanshi" onclick="guanshi(this)" src="./material/cloakroom/Guanshi/南宋银发冠.png">
                <img class="guanshi" onclick="guanshi(this)" src="./material/cloakroom/Guanshi/山口冠.png">
                <img class="guanshi" onclick="guanshi(this)" src="./material/cloakroom/Guanshi/宣化辽团冠.png">
                <img class="guanshi" onclick="guanshi(this)" src="./material/cloakroom/Guanshi/玉兰花团冠.png">
                <img class="guanshi" onclick="guanshi(this)" src="./material/cloakroom/Guanshi/重楼子花冠.png">
            </div>

            <div class="Frame" id="frame1">
                <img class="fazan" onclick="fazan(this)" src="./material/cloakroom/Jewelry/Fazan/鎏金龙纹银簪.png">
                <img class="fazan" onclick="fazan(this)" src="./material/cloakroom/Jewelry/Fazan/宋鎏金花筒钗.png">
                <img class="fazan" onclick="fazan(this)" src="./material/cloakroom/Jewelry/Fazan/银胆平顶脚簪.png">
                <img class="fazan" onclick="fazan(this)" src="./material/cloakroom/Jewelry/Fazan/银鎏金并头花簪.png">
            </div>

            <div class="Frame" id="frame2">
                <img class="ershi" onclick="ershi(this)" src="./material/cloakroom/Jewelry/Ershi/双鬓凤嫋莲花.png">
                <img class="ershi" onclick="ershi(this)" src="./material/cloakroom/Jewelry/Ershi/宋宫灯形金耳坠.png">
                <img class="ershi" onclick="ershi(this)" src="./material/cloakroom/Jewelry/Ershi/同心结龟游叠胜耳坠.png">
                <img class="ershi" onclick="ershi(this)" src="./material/cloakroom/Jewelry/Ershi/银鎏金菊花纹耳环.png">
            </div>

            <img class="introduce" src="./material/科普界面.png">
            <img class="buy" src="./material/购买按钮.png">
        </div>
    </div>

    <script>
        function toggle(a){
            var Elements = document.getElementsByClassName("button");
            var frameElements = document.getElementsByClassName("Frame");
            for(var i=0;i<Elements.length; i++){
                if(frameElements[i].style.visibility=="visible"){
                    frameElements[i].style.visibility = "hidden";
                }
                if(a==Elements[i]){
                    frameElements[i].style.visibility = "visible";
                }
            }
            
        }

        function guanshi(a) {
            var guanshiElements = document.getElementsByClassName("guanshi");
            var guanshiImage = document.getElementById("guanshi");
            if (guanshiImage.style.visibility === "visible") {
                guanshiImage.style.visibility = "hidden";
            }else{
                for (var i = 0; i < guanshiElements.length; i++) {
                    if(a==guanshiElements[i]){
                        document.getElementById("guanshi").style.visibility = "visible";
                        document.getElementById("guanshi").src = "./material/cloakroom/Guanshi/guanshi" + i + ".png";
                        if(i==4||i==5){
                            document.getElementById("fazan").style.visibility = "hidden";
                        }
                    }
                }
            }
        }

        function fazan(a) {
            var fazanElements = document.getElementsByClassName("fazan");
            var headImage = document.getElementById("head");
            var src1 = "./material/cloakroom/Hairstyle/hair0.png";
            var src2 = "./material/cloakroom/Hairstyle/hair3.png";
            var fazanImage = document.getElementById("fazan");
            if(headImage.getAttribute("src") === src1 || headImage.getAttribute("src")===src2){
                fazanImage.style.visibility = "hidden";
            }else{
                if (fazanImage.style.visibility === "visible") {
                    fazanImage.style.visibility = "hidden";
                }else{
                    for (var i = 0; i < fazanElements.length; i++) {
                        if (a ==fazanElements[i]) {
                            fazanImage.style.visibility = "visible";
                            fazanImage.src = "./material/cloakroom/Jewelry/Fazan/fazan" + i + ".png";
                        }
                    }
                }
            }
        }

        function ershi(a) {
            var ershiImage = document.getElementById("ershi");
            if (ershiImage.style.visibility === "visible") {
                ershiImage.style.visibility = "hidden";
            } else {
                var ershiElements = document.getElementsByClassName("ershi");
                for (var i = 0; i < ershiElements.length; i++) {
                    if (a === ershiElements[i]) {
                        ershiImage.style.visibility = "visible";
                        ershiImage.src = "./material/cloakroom/Jewelry/Ershi/ershi"+i+".png";
                        break;
                    }
                }
            }
        }

        function back(){
            window.location.href="index.html";
        }
    </script>
</body>
</html>
